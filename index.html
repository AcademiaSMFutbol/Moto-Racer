<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO RACER TURBO 88</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;
  font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;
}

/* ── SCANLINE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.13) 0px,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 3px);
}

#screen{
  position:relative;width:100vw;height:100vh;
  background:#0a0018;
  overflow:hidden;
}
canvas{display:block;width:100%;height:100%;}

/* ── CRT VIGNETTE ── */
#screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:50;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.75) 100%);
}

/* ── OVERLAY SCREENS ── */
.overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:60;background:rgba(0,0,20,0.92);
  gap:0;
}
.overlay.hidden{display:none;}

.big-title{
  font-size:clamp(32px,6vw,80px);
  color:#ff00ff;letter-spacing:8px;
  text-shadow:0 0 20px #ff00ff,0 0 60px #ff00ff,6px 6px 0 #660066;
  animation:neonPulse 1.4s infinite alternate;
  margin-bottom:12px;
}
.sub-title{
  font-size:clamp(10px,2vw,22px);color:#00ffff;letter-spacing:10px;
  text-shadow:0 0 14px #00ffff;margin-bottom:60px;
}
.blink-msg{
  font-size:clamp(10px,1.8vw,20px);color:#ffff00;
  text-shadow:0 0 12px #ffff00;
  padding:18px 36px;border:3px solid #ffff00;
  box-shadow:0 0 24px #ffff0055;
  animation:blink .9s step-end infinite;
  margin-bottom:40px;
}
.controls-info{
  display:flex;gap:clamp(20px,4vw,60px);margin-top:10px;
}
.ctrl-box{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  border:2px solid #333;padding:16px 24px;
}
.ctrl-icon{font-size:clamp(18px,3vw,36px);color:#ff00ff;text-shadow:0 0 10px #ff00ff;}
.ctrl-label{font-size:clamp(6px,1vw,11px);color:#888;letter-spacing:2px;}

/* GO */
#go-screen .big-title{color:#ff2200;text-shadow:0 0 20px #ff2200,0 0 60px #ff2200,6px 6px 0 #660000;animation:none;}
#go-score{font-size:clamp(14px,2.5vw,32px);color:#ffff00;text-shadow:0 0 14px #ffff00;margin-bottom:14px;}
#go-best {font-size:clamp(9px,1.5vw,18px);color:#00ffff;text-shadow:0 0 10px #00ffff;margin-bottom:50px;}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:clamp(8px,2vh,24px) clamp(16px,3vw,48px);
  z-index:55;pointer-events:none;
}
.hud-block{display:flex;flex-direction:column;gap:4px;}
.hud-label{font-size:clamp(6px,1vw,12px);color:#880088;letter-spacing:3px;}
.hud-val{font-size:clamp(10px,2vw,26px);color:#ff00ff;text-shadow:0 0 10px #ff00ff;}
.hud-center{text-align:center;}

/* ── GAMEPAD INDICATOR ── */
#gamepad-status{
  position:absolute;bottom:clamp(8px,2vh,20px);right:clamp(16px,3vw,40px);
  font-size:clamp(6px,1vw,11px);z-index:55;pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
#gp-dot{width:10px;height:10px;border-radius:50%;background:#333;box-shadow:0 0 6px #333;}
#gp-dot.connected{background:#00ff88;box-shadow:0 0 12px #00ff88;}
#gp-label{color:#555;letter-spacing:2px;}

@keyframes blink{50%{opacity:0;}}
@keyframes neonPulse{
  from{text-shadow:0 0 20px #ff00ff,0 0 60px #ff00ff,6px 6px 0 #660066;}
  to  {text-shadow:0 0 40px #ff00ff,0 0 120px #ff00ff,0 0 200px #ff00ff,6px 6px 0 #660066;}
}
</style>
</head>
<body>
<div id="screen">
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="hud-score">000000</div>
    </div>
    <div class="hud-block hud-center">
      <div class="hud-label">VELOCIDAD</div>
      <div class="hud-val" id="hud-speed">060 KM/H</div>
    </div>
    <div class="hud-block" style="text-align:right">
      <div class="hud-label">RECORD</div>
      <div class="hud-val" id="hud-best">000000</div>
    </div>
  </div>

  <!-- TITLE -->
  <div class="overlay" id="title-screen">
    <div class="big-title">MOTO RACER</div>
    <div class="sub-title">TURBO  88</div>
    <div class="blink-msg">PULSA  ●  PARA  EMPEZAR</div>
    <div class="controls-info">
      <div class="ctrl-box">
        <div class="ctrl-icon">🎮</div>
        <div class="ctrl-label">D-PAD / STICK</div>
        <div class="ctrl-label" style="color:#ff00ff">◀ IZQUIERDA ▶ DERECHA</div>
      </div>
      <div class="ctrl-box">
        <div class="ctrl-icon">⌨️</div>
        <div class="ctrl-label">TECLADO</div>
        <div class="ctrl-label" style="color:#ff00ff">← A &nbsp;&nbsp; → D</div>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="go-screen">
    <div class="big-title">GAME OVER</div>
    <div id="go-score">SCORE: 000000</div>
    <div id="go-best">RECORD: 000000</div>
    <div class="blink-msg">PULSA  ●  PARA  REINTENTAR</div>
  </div>

  <!-- GAMEPAD INDICATOR -->
  <div id="gamepad-status">
    <div id="gp-dot"></div>
    <div id="gp-label">MANDO</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (state) {
    LANE_W = W / LANES;
    state.moto.x = laneX(state.moto.lane);
    state.moto.y = H * 0.78;
  }
}
window.addEventListener('resize', resize);

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
let AC;
function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}
function note(f, t, d, v = 0.22, delay = 0) {
  if (!AC) return;
  const now = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = t; o.frequency.setValueAtTime(f, now);
  g.gain.setValueAtTime(v, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + d);
  o.start(now); o.stop(now + d);
}
let engOsc = null;
function startEng() {
  if (!AC) return;
  if (engOsc) { try { engOsc.stop(); } catch(e){} }
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sawtooth'; o.frequency.value = 90; g.gain.value = 0.05;
  o.start(); engOsc = o;
}
function stopEng() {
  if (engOsc) { try { engOsc.stop(); } catch(e){} engOsc = null; }
}
function sfxDodge() { note(880,'square',0.07,0.14); note(1320,'square',0.07,0.11,0.08); }
function sfxStart()  { [261,329,392,523].forEach((f,i) => note(f,'square',0.15,0.22,i*0.1)); }
function sfxCrash()  {
  for (let i=0;i<10;i++) note(60+Math.random()*320,'square',.3+Math.random()*.3,.15,i*.04);
  note(50,'sawtooth',1,0.22);
}

// ══════════════════════════════════════════
//  LANES & STATE
// ══════════════════════════════════════════
const LANES = 5;
let LANE_W = 200;
function laneX(l) { return l * LANE_W + LANE_W / 2; }

let state, bestScore = 0;
function initState() {
  return {
    phase: 'title',
    moto: { lane: 2, x: laneX(2), y: H * 0.78, lean: 0 },
    obstacles: [],
    score: 0,
    speed: 5,
    tick: 0,
    spawnTimer: 0,
    spawnInterval: 80,
    exploding: false,
    particles: [],
    stars: Array.from({length:120}, () => ({
      x: Math.random() * 2000, y: Math.random() * 2000,
      s: Math.random() * 2 + 0.5, b: Math.random()
    }))
  };
}
state = initState();

// ══════════════════════════════════════════
//  GAMEPAD
// ══════════════════════════════════════════
let gamepadIndex = null;
let gpPrevLeft = false, gpPrevRight = false, gpPrevBtn = false;

window.addEventListener('gamepadconnected', e => {
  gamepadIndex = e.gamepad.index;
  document.getElementById('gp-dot').classList.add('connected');
  document.getElementById('gp-label').style.color = '#00ff88';
  initAudio();
});
window.addEventListener('gamepaddisconnected', () => {
  gamepadIndex = null;
  document.getElementById('gp-dot').classList.remove('connected');
  document.getElementById('gp-label').style.color = '#555';
});

function pollGamepad() {
  if (gamepadIndex === null) return;
  const gp = navigator.getGamepads()[gamepadIndex];
  if (!gp) return;

  // D-pad: buttons 14=left 15=right  |  Left stick axis 0
  const axisLeft  = gp.axes[0] < -0.5;
  const axisRight = gp.axes[0] >  0.5;
  const dLeft  = gp.buttons[14]?.pressed || axisLeft;
  const dRight = gp.buttons[15]?.pressed || axisRight;

  // Any face button (0=A/Cross, 1=B/Circle, 2=X/Square, 3=Y/Triangle, 8=select, 9=start)
  const anyBtn = [0,1,2,3,8,9].some(i => gp.buttons[i]?.pressed);

  // Edge detection
  if (dLeft  && !gpPrevLeft)  doLeft();
  if (dRight && !gpPrevRight) doRight();
  if (anyBtn && !gpPrevBtn)   doStart();

  gpPrevLeft  = dLeft;
  gpPrevRight = dRight;
  gpPrevBtn   = anyBtn;
}

// ══════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════
const held = {};
document.addEventListener('keydown', e => {
  if (held[e.code]) return;
  held[e.code] = true;
  if (e.code==='ArrowLeft'  || e.code==='KeyA') doLeft();
  if (e.code==='ArrowRight' || e.code==='KeyD') doRight();
  if (e.code==='Space' || e.code==='Enter')     { e.preventDefault(); doStart(); }
  if (e.code==='ArrowUp' || e.code==='ArrowDown') e.preventDefault();
});
document.addEventListener('keyup', e => { held[e.code] = false; });

// ══════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════
function doLeft() {
  initAudio();
  if (state.phase !== 'playing') { doStart(); return; }
  if (state.moto.lane > 0) { state.moto.lane--; sfxDodge(); }
}
function doRight() {
  initAudio();
  if (state.phase !== 'playing') { doStart(); return; }
  if (state.moto.lane < LANES-1) { state.moto.lane++; sfxDodge(); }
}
function doStart() {
  initAudio();
  if (state.phase === 'title' || state.phase === 'gameover') startGame();
}
function startGame() {
  stopEng();
  state = initState();
  resize();
  state.phase = 'playing';
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('go-screen').classList.add('hidden');
  sfxStart();
  setTimeout(startEng, 450);
}
function gameOver() {
  state.phase = 'gameover';
  if (state.score > bestScore) bestScore = state.score;
  document.getElementById('go-score').textContent = 'SCORE:  ' + String(state.score).padStart(6,'0');
  document.getElementById('go-best').textContent  = 'RECORD: ' + String(bestScore).padStart(6,'0');
  document.getElementById('go-screen').classList.remove('hidden');
}

// ══════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════
function spawnObstacle() {
  // Never spawn same lane as moto
  let lane;
  do { lane = Math.floor(Math.random() * LANES); } while (lane === state.moto.lane && Math.random() < 0.6);
  const types = ['car','car','truck','cone','cone'];
  state.obstacles.push({ lane, x: laneX(lane), y: -120, type: types[Math.floor(Math.random()*types.length)], hit: false });
}
function spawnParticles(x, y) {
  for (let i=0; i<40; i++) {
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*8;
    state.particles.push({
      x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:.018+Math.random()*.012,
      color:['#ff4400','#ffaa00','#ffff00','#ff0000','#fff','#ff6600'][Math.floor(Math.random()*6)],
      size:(3+Math.random()*6)*( W/1920)
    });
  }
}
function update() {
  if (state.phase !== 'playing') return;
  state.tick++;

  if (engOsc) engOsc.frequency.value = 80 + state.speed * 3.2;
  state.speed = Math.min(22, 5 + state.score / 400);

  // Moto smooth
  const tx = laneX(state.moto.lane);
  state.moto.lean = (tx - state.moto.x) * 0.06;
  state.moto.x += (tx - state.moto.x) * 0.15;
  state.moto.y  = H * 0.78;

  // Spawn
  if (++state.spawnTimer >= state.spawnInterval) {
    spawnObstacle();
    state.spawnTimer = 0;
    state.spawnInterval = Math.max(28, 80 - state.score / 60);
  }

  // Move
  state.obstacles.forEach(o => o.y += state.speed);
  state.obstacles = state.obstacles.filter(o => o.y < H + 150);

  // Collide
  if (!state.exploding) {
    for (const o of state.obstacles) {
      if (o.hit) continue;
      const scl = W / 1920;
      const hw = (o.type==='truck' ? 52 : 40) * scl;
      const hh = (o.type==='truck' ? 100 : 80) * scl;
      if (Math.abs(state.moto.x-o.x) < hw && Math.abs(state.moto.y-o.y) < hh) {
        o.hit = true;
        spawnParticles(state.moto.x, state.moto.y);
        stopEng(); sfxCrash();
        state.exploding = true;
        setTimeout(gameOver, 1100);
        break;
      }
    }
  }

  // Particles
  state.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.life-=p.decay; });
  state.particles = state.particles.filter(p => p.life > 0);

  if (!state.exploding) state.score += Math.ceil(state.speed / 4);
}

// ══════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════
function drawRoad() {
  const s = W / 1920;

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H*0.45);
  sky.addColorStop(0,'#050010');
  sky.addColorStop(1,'#1a0035');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.45);

  // Stars
  state.stars.forEach(st => {
    const x = (st.x % W + state.tick * 0.3) % W;
    const y = (st.y % (H*0.45));
    const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(state.tick * 0.02 + st.b * 10));
    ctx.globalAlpha = twinkle * 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, st.s * s, st.s * s);
  });
  ctx.globalAlpha = 1;

  // Horizon glow
  const hglow = ctx.createLinearGradient(0, H*0.38, 0, H*0.48);
  hglow.addColorStop(0,'rgba(180,0,255,0.0)');
  hglow.addColorStop(.5,'rgba(180,0,255,0.35)');
  hglow.addColorStop(1,'rgba(180,0,255,0.0)');
  ctx.fillStyle = hglow; ctx.fillRect(0, H*0.38, W, H*0.1);

  // Road surface
  const road = ctx.createLinearGradient(0,H*0.44,0,H);
  road.addColorStop(0,'#1e1e38');
  road.addColorStop(1,'#111128');
  ctx.fillStyle = road; ctx.fillRect(0,H*0.44,W,H*0.56);

  // Scanlines on road
  for (let y=Math.floor(H*0.44);y<H;y+=4) {
    ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fillRect(0,y,W,1);
  }

  // Perspective grid lines (horizontal)
  const VP = { x: W/2, y: H*0.44 };
  ctx.strokeStyle='rgba(180,0,255,0.18)'; ctx.lineWidth=1;
  for (let i=0;i<16;i++) {
    const t = i/15;
    const y = VP.y + (H - VP.y) * (t*t);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Lane dividers (perspective)
  ctx.setLineDash([30*s, 22*s]);
  ctx.strokeStyle='#ffff00'; ctx.lineWidth=2*s;
  for (let l=1;l<LANES;l++) {
    const xBottom = l*(W/LANES);
    const xTop    = VP.x + (xBottom - VP.x) * 0.15;
    ctx.lineDashOffset = -(state.tick * state.speed * 0.5 % 52);
    ctx.beginPath(); ctx.moveTo(xTop, VP.y); ctx.lineTo(xBottom, H); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.lineDashOffset = 0;

  // Side strips
  ctx.fillStyle='#cc1100';
  ctx.fillRect(0,H*0.44,6*s,H);
  ctx.fillRect(W-6*s,H*0.44,6*s,H);
  ctx.fillStyle='#fff';
  ctx.fillRect(2*s,H*0.44,2*s,H);
  ctx.fillRect(W-4*s,H*0.44,2*s,H);

  // Neon road edge glow
  const leftGlow = ctx.createLinearGradient(0,0,60*s,0);
  leftGlow.addColorStop(0,'rgba(255,0,100,0.25)');
  leftGlow.addColorStop(1,'transparent');
  ctx.fillStyle=leftGlow; ctx.fillRect(0,H*0.44,60*s,H);
  const rightGlow = ctx.createLinearGradient(W,0,W-60*s,0);
  rightGlow.addColorStop(0,'rgba(255,0,100,0.25)');
  rightGlow.addColorStop(1,'transparent');
  ctx.fillStyle=rightGlow; ctx.fillRect(W-60*s,H*0.44,60*s,H);
}

function drawMoto(x, y, lean) {
  const s = W / 1920;
  ctx.save(); ctx.translate(x, y); ctx.rotate(lean * 0.08); ctx.scale(s*1.1, s*1.1);

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, 75, 40, 10, 0, 0, Math.PI*2); ctx.fill();

  // Rear wheel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(0, 52, 22, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=5; ctx.stroke();
  ctx.strokeStyle='#888'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0, 52, 12, 12, 0, 0, Math.PI*2); ctx.stroke();

  // Front wheel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(0, -50, 18, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=5; ctx.stroke();
  ctx.strokeStyle='#888'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0, -50, 10, 10, 0, 0, Math.PI*2); ctx.stroke();

  // Frame
  ctx.fillStyle='#cc0044';
  ctx.beginPath();
  ctx.moveTo(-13,42); ctx.lineTo(-16,-14); ctx.lineTo(-6,-42);
  ctx.lineTo(6,-42); ctx.lineTo(16,-14); ctx.lineTo(13,42);
  ctx.closePath(); ctx.fill();

  // Fairing
  ctx.fillStyle='#ff0066';
  ctx.beginPath();
  ctx.moveTo(-15,-10); ctx.lineTo(-9,-44); ctx.lineTo(9,-44); ctx.lineTo(15,-10);
  ctx.closePath(); ctx.fill();

  // Windshield
  ctx.fillStyle='rgba(120,210,255,.55)';
  ctx.beginPath();
  ctx.moveTo(-8,-16); ctx.lineTo(-5,-38); ctx.lineTo(5,-38); ctx.lineTo(8,-16);
  ctx.closePath(); ctx.fill();

  // Seat
  ctx.fillStyle='#111'; ctx.fillRect(-11,6,22,22);

  // Rider / helmet
  ctx.fillStyle='#ff0066';
  ctx.beginPath(); ctx.ellipse(0,-8,13,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(120,210,255,.65)';
  ctx.beginPath(); ctx.ellipse(0,-7,8,7,0,0,Math.PI); ctx.fill();

  // Exhaust glow
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=20;
  ctx.fillStyle='#ff6600';
  ctx.beginPath(); ctx.ellipse(-8,52,6,6,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Headlight beam
  ctx.shadowColor='#aaffff'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffffcc';
  ctx.beginPath(); ctx.ellipse(0,-50,6,5,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Light cone on road (when playing)
  if (!state.exploding) {
    const cone = ctx.createRadialGradient(0,-50,0,0,80,120);
    cone.addColorStop(0,'rgba(255,255,200,0.08)');
    cone.addColorStop(1,'transparent');
    ctx.fillStyle=cone;
    ctx.beginPath(); ctx.moveTo(-4,-44); ctx.lineTo(-60,120); ctx.lineTo(60,120); ctx.lineTo(4,-44); ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

function drawCar(x, y) {
  const s = W/1920;
  ctx.save(); ctx.translate(x,y); ctx.scale(s*1.1,s*1.1);
  ctx.fillStyle='#0055dd'; ctx.fillRect(-32,-50,64,90);
  ctx.fillStyle='#0033aa'; ctx.fillRect(-22,-76,44,30);
  ctx.fillStyle='rgba(160,230,255,.75)'; ctx.fillRect(-18,-73,36,24);
  ctx.fillStyle='#111';
  [[-28,-36],[28,-36],[-28,30],[28,30]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.ellipse(wx,wy,10,10,0,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#ff4400'; ctx.fillRect(-30,36,18,8); ctx.fillRect(12,36,18,8);
  ctx.fillStyle='#ffffaa'; ctx.fillRect(-30,-48,18,8); ctx.fillRect(12,-48,18,8);
  ctx.restore();
}

function drawTruck(x, y) {
  const s = W/1920;
  ctx.save(); ctx.translate(x,y); ctx.scale(s*1.1,s*1.1);
  ctx.fillStyle='#772200'; ctx.fillRect(-36,-90,72,150);
  ctx.fillStyle='#bb5500'; ctx.fillRect(-36,-90,72,48);
  ctx.fillStyle='rgba(160,230,255,.7)'; ctx.fillRect(-28,-86,56,30);
  ctx.fillStyle='#111';
  [[-32,-60],[32,-60],[-32,42],[32,42]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.ellipse(wx,wy,12,12,0,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#ff4400'; ctx.fillRect(-32,52,22,10); ctx.fillRect(10,52,22,10);
  ctx.restore();
}

function drawCone(x, y) {
  const s = W/1920;
  ctx.save(); ctx.translate(x,y); ctx.scale(s*1.1,s*1.1);
  ctx.fillStyle='#ff5500';
  ctx.beginPath(); ctx.moveTo(0,-36); ctx.lineTo(-20,22); ctx.lineTo(20,22); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(-18,-4,36,8);
  ctx.fillStyle='#222'; ctx.fillRect(-22,22,44,8);
  ctx.restore();
}

function drawParticles() {
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.ellipse(p.x,p.y,p.size,p.size,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

function render() {
  if (!W || !H) return;
  ctx.clearRect(0,0,W,H);
  drawRoad();

  state.obstacles.forEach(o => {
    if (o.type==='car')   drawCar(o.x, o.y);
    else if (o.type==='truck') drawTruck(o.x, o.y);
    else drawCone(o.x, o.y);
  });

  if (!state.exploding) drawMoto(state.moto.x, state.moto.y, state.moto.lean);
  drawParticles();

  // Speed streaks
  if (state.speed > 9 && !state.exploding) {
    const a = Math.min(0.2, (state.speed-9)/26);
    ctx.globalAlpha = a; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    for (let i=0;i<18;i++) {
      const lx=20+Math.random()*(W-40), ly=H*0.44+Math.random()*(H*0.56);
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx,ly+40+Math.random()*60); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // HUD
  document.getElementById('hud-score').textContent = String(state.score).padStart(6,'0');
  document.getElementById('hud-speed').textContent = Math.floor(60+state.speed*14)+' KM/H';
  document.getElementById('hud-best').textContent  = String(bestScore).padStart(6,'0');
}

// ══════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════
function loop() {
  pollGamepad();
  update();
  render();
  requestAnimationFrame(loop);
}

resize();
loop();
</script>
</body>
</html>
